server {
  listen 80;
  server_name _;

  include /etc/nginx/includes/robopulse.locations.conf;
}

server {
  listen 443 ssl;
  server_name _;

  ssl_certificate /etc/nginx/certs/robopulse.local.crt;
  ssl_certificate_key /etc/nginx/certs/robopulse.local.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  include /etc/nginx/includes/robopulse.locations.conf;
}
